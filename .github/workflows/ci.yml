name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check lcz_binance_sdk/
      - name: Type check (mypy)
        run: mypy lcz_binance_sdk/ --ignore-missing-imports
      - name: Test (pytest)
        run: pytest tests/ -v
