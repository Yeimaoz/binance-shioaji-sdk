name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: [self-hosted, lcz-wsl-rtx5080]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python venv
        run: |
          python3.12 -m venv venv
          source venv/bin/activate
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          source venv/bin/activate
          ruff check lcz_binance_sdk/
      - name: Type check (mypy)
        run: |
          source venv/bin/activate
          mypy lcz_binance_sdk/ --ignore-missing-imports
      - name: Test (pytest)
        run: |
          source venv/bin/activate
          pytest tests/ -v
